<!-- Template gốc -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hệ Thống Gợi Ý Kế Hoạch Học Tập{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="brand brand-logo" href="/" aria-label="Trang chủ">
                <img class="brand-logo-img" src="{{ url_for('static', filename='images/logo.png') }}" alt="Gợi ý Kế Hoạch Học Tập">
                <span class="brand-text">Gợi ý Kế Hoạch Học Tập</span>
            </a>
            <ul class="nav-links">
                <li><a href="/">Trang chủ</a></li>
                <li><a href="/students">Kế hoạch học tập</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message" data-message="{{ message | e }}" data-type="info" hidden></div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

</body>
</html>
